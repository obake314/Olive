services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/olive-backend:${IMAGE_TAG:-latest}
    container_name: olive-backend
    restart: unless-stopped
    environment:
      PORT: "3000"
      DB_PATH: /data/olive.db
    volumes:
      - olive-data:/data
    networks:
      - olive-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: ghcr.io/${GITHUB_REPOSITORY}/olive-web:${IMAGE_TAG:-latest}
    container_name: olive-web
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - olive-net
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # nginx がリバースプロキシとして /api を backend に転送
      BACKEND_URL: "http://backend:3000"

volumes:
  olive-data:
    driver: local

networks:
  olive-net:
    driver: bridge

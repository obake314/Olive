services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/olive-backend:${IMAGE_TAG:-latest}
    container_name: olive-backend
    restart: unless-stopped
    environment:
      PORT: "3000"
      DB_PATH: /data/olive.db
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://olive.eclo.info}
    volumes:
      - olive-data:/data
    networks:
      - olive-net
    ports:
      - "3003:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/olive-web:${IMAGE_TAG:-latest}
    container_name: olive-web
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - olive-net
    depends_on:
      backend:
        condition: service_healthy

volumes:
  olive-data:
    driver: local

networks:
  olive-net:
    driver: bridge
